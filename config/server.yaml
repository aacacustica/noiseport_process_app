paths:
  inbox: /srv/services/inbox
  logs: /var/log/noiseport-server
  state: /srv/noiseport/state

  ships_1h: server_process_app/common/resources/CONTENEDORES_TCT_embarques_1h.csv
  ships_15min: server_process_app/common/resources/CONTENEDORES_TCT_embarques_15min.csv
  ships_1s: server_process_app/common/resources//CONTENEDORES_TCT_embarques_1s.csv

  point_coeffs: server_process_app/common/resources/point_coeffs.json

  root_folder: /srv/services/noiseport-server

processing:
  wav_folder: wav_files
  acoustic_folder: acoustics
  prediction_folder: predictions
  sonometer_folder: sonometer_files

  acoustic_queries_folder: acoustic_queries
  prediction_queries_folder: prediction_queries
  peaks_folder: peaks_query
  merged_folder: merged_csv_query

  fixed_prefix: fixed_
  expected_wavs_per_hour: 60
  mode: urban                                                                                            # GENERAL urban || port

acoustic:
  sample_rate: 16000
  window_size: 16000

inference:
  sample_rate: 16000
  chunk_size: 15600
  window_size: 1.0
  threshold: 0.3
  mode: urban                                                                                           # INFERENCE urban || port

models:

  yamnet_h5: server_process_app/common/resources/models/yamnet.h5
  yamnet_class_map: server_process_app/common/resources/yamnet_class_AAC_v3_0.csv
  urban_taxonomy_mapping: server_process_app/common/resources/urban_taxonomy_map_v1_0.json
  port_taxonomy_mapping: server_process_app/common/resources/port_1_taxonomy_mapping_v2.0.json

queries:
  db_init: false
  acoustic_query: true
  prediction_query: true
  wav_query: false
  sonometer_query: false
  send_mqtt: false
  time_slop_fix: false
  sonometer_window: 3600
  acoustic_table_name: acoustic_params
  predictions_table_name: predict_data
  sonometer_table_name: sonometer_acoustic_data
  wav_table_name: wav_data
  
peaks:
  window_size: 30
  adding_threshold: 5
  prominence: 3
  width: 2

alarms:
  mode: urban
  oca_limit: OCA_RESIDENTIAL
  agg_period: 900
  percentiles: [90, 10]
  probability_threshold: 0.3
  audiomoth: true
  sonometer: false
  raspberry: false

visualization:
  agg_period: 900
  percentiles: [90, 10]
  limit_oca: OCA_RESIDENTIAL
  taxonomy: port
  filter_point: null
  mode:                                                                                                   # VISUALIZATION urban | port
  change_date: false                                                                                      # true | false (default)                               
  audiomoth: true
  sonometer: false
  raspberry: false

pipeline:
  enabled_steps:
    - queries
    - peaks
    - alarms
    - visualizations

conda:
  env_name: s3_env